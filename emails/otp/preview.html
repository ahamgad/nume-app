<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<meta name="supported-color-schemes" content="light dark" />
<title>Your NUME sign-in code</title>
<style type="text/css">
    .email-body { background-color: #F7F7F7; }
    .email-card { background-color: #FFFFFF; border-color: #EFEFEF; }
    .email-title { color: #252525; }
    .email-description { color: #252525; }
    .email-helper { color: #8E8E8E; }
    .email-footer { color: #8E8E8E; }
    .email-code-block { background-color: #FFFFFF; border-color: #EFEFEF; color: #252525; }
    .email-logo-light { display: block !important; }
    .email-logo-dark { display: none !important; }
    @media (prefers-color-scheme: dark) {
      .email-body { background-color: #1A1A1A !important; }
      .email-card { background-color: #262626 !important; border-color: rgba(255,255,255,0.10) !important; }
      .email-title { color: #FAFAFA !important; }
      .email-description { color: #FAFAFA !important; }
      .email-helper { color: #B0B0B0 !important; }
      .email-footer { color: #B0B0B0 !important; }
      .email-code-block { background-color: #262626 !important; border-color: rgba(255,255,255,0.15) !important; color: #FAFAFA !important; }
      .email-logo-light { display: none !important; }
      .email-logo-dark { display: block !important; }
    }
  </style>
<!--[if mso]>
<style type="text/css">
  body, table, td { font-family: Arial, Helvetica, sans-serif !important; }
</style>
<![endif]-->
</head>
<body class="email-body" style="margin:0;padding:0;background-color:#F7F7F7;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <div style="display:none;font-size:1px;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
    Use this code to continue to NUME
  </div>
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" class="email-body" style="background-color:#F7F7F7;">
    <tr>
      <td align="center" style="padding:24px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:400px;width:100%;">
          <tr>
            <td class="email-card" style="background-color:#FFFFFF;border:1px solid #EFEFEF;border-radius:16px;padding:16px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
    <td style="padding:0 0 12px 0;">
      <img src="{{ .SiteURL }}/email/nume-mark-light.png" width="48" height="48" alt="NUME" class="email-logo-light" style="display:block;border:0;outline:none;text-decoration:none;width:48px;height:48px;border-radius:8px;" />
      <img src="{{ .SiteURL }}/email/nume-mark-dark.png" width="48" height="48" alt="NUME" class="email-logo-dark" style="display:block;border:0;outline:none;text-decoration:none;width:48px;height:48px;border-radius:8px;" />
    </td>
  </tr>
                <tr>
                  <td class="email-title" style="padding:0 0 12px 0;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:24px;font-weight:600;line-height:1.25;color:#252525;">
                    Enter your code
                  </td>
                </tr>
                <tr>
                  <td class="email-description" style="padding:0 0 16px 0;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:15px;font-weight:400;line-height:1.5;color:#252525;">
                    Use this code to continue signing in to NUME
                  </td>
                </tr>
                <tr>
                  <td style="padding:0;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" class="email-code-block" style="border:1px solid #EFEFEF;border-radius:8px;background-color:#FFFFFF;">
    <tr>
      <td align="center" style="min-height:56px;padding:16px 12px;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:32px;font-weight:600;line-height:1.2;letter-spacing:0.28em;color:#252525;">
        847293
      </td>
    </tr>
  </table>
                  </td>
                </tr>
                <tr>
                  <td class="email-helper" style="padding:16px 0 0 0;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:13px;font-weight:400;line-height:1.45;color:#8E8E8E;">
                    If you didn't request this code, you can safely ignore this email
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td align="center" class="email-footer" style="padding:24px 0 0 0;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:12px;font-weight:400;line-height:1.4;color:#8E8E8E;">
              2026 © NUME
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
