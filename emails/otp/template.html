<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<meta name="supported-color-schemes" content="light dark" />
<title>Your NUME sign-in code</title>
<style type="text/css">
    .email-page { background-color: #F7F7F7; }
    .email-card { background-color: #FFFFFF; border-color: #E8E8E8; }
    .email-title { color: #171717; }
    .email-support { color: #737373; }
    .email-code-box { background-color: #FFFFFF; border-color: #E8E8E8; color: #171717; }
    .email-helper { color: #8E8E8E; }
    .email-footer { color: #A3A3A3; }
    @media (prefers-color-scheme: dark) {
      .email-page { background-color: #111111 !important; }
      .email-footer { color: #737373 !important; }
    }
  </style>
<!--[if mso]>
<style type="text/css">
  body, table, td { font-family: Arial, Helvetica, sans-serif !important; }
</style>
<![endif]-->
</head>
<body class="email-page" style="margin:0;padding:0;background-color:#F7F7F7;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <div style="display:none;font-size:1px;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
    Use this code to continue to NUME
  </div>
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" class="email-page" style="background-color:#F7F7F7;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:340px;width:100%;">
          <tr>
            <td align="center" class="email-card" style="background-color:#FFFFFF;border:1px solid #E8E8E8;border-radius:20px;padding:56px 28px 32px 28px;text-align:center;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center" style="padding:0 0 28px 0;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto;">
    <tr>
      <td align="center" style="padding:0;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td align="center" valign="middle" style="padding:0 8px 0 0;line-height:0;">
              <img src="{{ .SiteURL }}/email/nume-icon.png" width="20" height="20" alt="" style="display:block;border:0;outline:none;text-decoration:none;width:20px;height:20px;" />
            </td>
            <td align="left" valign="middle" style="padding:0;line-height:0;">
              <img src="{{ .SiteURL }}/email/nume-wordmark.png" width="45" height="15" alt="NUME" style="display:block;border:0;outline:none;text-decoration:none;width:45px;height:15px;" />
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
                  </td>
                </tr>
                <tr>
                  <td align="center" class="email-title" style="padding:0 0 12px 0;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:32px;font-weight:700;line-height:1.15;letter-spacing:-0.02em;color:#171717;text-align:center;">
                    Enter your code
                  </td>
                </tr>
                <tr>
                  <td align="center" class="email-support" style="padding:0 0 28px 0;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:15px;font-weight:400;line-height:1.5;color:#737373;text-align:center;">
                    Use this code to continue signing in to NUME
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding:0;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" class="email-code-box" style="border:1px solid #E8E8E8;border-radius:12px;background-color:#FFFFFF;">
    <tr>
      <td align="center" style="padding:24px 20px;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;font-size:36px;font-weight:600;line-height:1.1;letter-spacing:0.32em;color:#171717;">
        {{ .Token }}
      </td>
    </tr>
  </table>
                  </td>
                </tr>
                <tr>
                  <td align="center" class="email-helper" style="padding:20px 0 0 0;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:13px;font-weight:400;line-height:1.45;color:#8E8E8E;text-align:center;">
                    If you didn't request this code, you can safely ignore this email
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td align="center" class="email-footer" style="padding:20px 0 0 0;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:11px;font-weight:400;line-height:1.4;color:#A3A3A3;text-align:center;">
              2026 © NUME
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
